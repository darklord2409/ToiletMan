server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Mirrors this app's Vite dev proxy (see vite.config.ts) so the built
    # static bundle keeps using relative "/api/v1" calls unchanged — only
    # the reverse-proxy target differs (a Docker service name either way).
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://backend:8000/media/;
        proxy_set_header Host $host;
    }

    # Client-side routing (react-router): unknown paths fall back to
    # index.html instead of a bare nginx 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
