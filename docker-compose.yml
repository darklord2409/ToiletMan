name: tipobot

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tipobot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tipobot}
      POSTGRES_DB: ${POSTGRES_DB:-tipobot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tipobot} -d ${POSTGRES_DB:-tipobot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tipobot_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tipobot_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - tipobot_network

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      BACKEND_HOST: backend
      BACKEND_PORT: 8000
      BACKEND_BASE_URL: http://backend:8000/api/v1
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./bot:/app
    networks:
      - tipobot_network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-5173}:5173"
    depends_on:
      - backend
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules
    networks:
      - tipobot_network

  miniapp:
    build:
      context: ./miniapp
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${MINIAPP_PORT:-5174}:5174"
    depends_on:
      - backend
    volumes:
      - ./miniapp:/app
      - miniapp_node_modules:/app/node_modules
    networks:
      - tipobot_network

networks:
  tipobot_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  admin_node_modules:
  miniapp_node_modules:
